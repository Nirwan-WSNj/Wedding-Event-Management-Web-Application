name: Laravel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_sqlite, fileinfo, openssl, tokenizer, xml, ctype, json, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Prepare environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env || true
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=database\/database.sqlite/' .env || true

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Generate app key
        run: php artisan key:generate

      - name: Clear caches
        run: php artisan optimize:clear

      - name: Check routes
        run: php artisan route:list

      - name: Run migrations and seeders
        run: php artisan migrate:fresh --seed --force

      - name: Run tests
        run: php artisan test

      - name: Build frontend
        run: npm run build
